<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exported from Figma">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">
    <title>Калькулятор</title>
</head>

<body>

<form id="calculatorForm" method="post" action="/calculate">
    <div class="desktop-1-1">
        <div class="calculator-2">
            <!-- Дисплей - изменен на input -->
            <div class="display-3">
                <input type="text"
                       id="display"
                       name="expression"
                       th:value="${expression}"
                       class="display-input"
                       readonly
                       placeholder="0">
            </div>

            <input type="hidden" id="needResetFlag" th:value="${needReset}">

            <!-- Ряд 1 -->
            <div class="row-5">
                <div class="button-6" data-value="1">
                    <p class="text-7"><span class="text-black">1</span></p>
                </div>
                <div class="button-8" data-value="2">
                    <p class="text-9"><span class="text-black">2</span></p>
                </div>
                <div class="button-10" data-value="3">
                    <p class="text-11"><span class="text-black">3</span></p>
                </div>
                <div class="button-12">
                    <p class="text-13"><span class="text-white">DEL</span></p>
                </div>
            </div>

            <!-- Ряд 2 -->
            <div class="row-14">
                <div class="button-15" data-value="4">
                    <p class="text-16"><span class="text-black">4</span></p>
                </div>
                <div class="button-17" data-value="5">
                    <p class="text-18"><span class="text-black">5</span></p>
                </div>
                <div class="button-19" data-value="6">
                    <p class="text-20"><span class="text-black">6</span></p>
                </div>
                <div class="button-21" data-value="+">
                    <p class="text-22"><span class="text-black">+</span></p>
                </div>
            </div>

            <!-- Ряд 3 -->
            <div class="row-23">
                <div class="button-24" data-value="7">
                    <p class="text-25"><span class="text-black">7</span></p>
                </div>
                <div class="button-26" data-value="8">
                    <p class="text-27"><span class="text-black">8</span></p>
                </div>
                <div class="button-28" data-value="9">
                    <p class="text-29"><span class="text-black">9</span></p>
                </div>
                <div class="button-30" data-value="-">
                    <p class="text-31"><span class="text-black">-</span></p>
                </div>
            </div>

            <!-- Ряд 4 -->
            <div class="row-32">
                <div class="button-33" data-value=".">
                    <p class="text-34"><span class="text-black">.</span></p>
                </div>
                <div class="button-35" data-value="0">
                    <p class="text-36"><span class="text-black">0</span></p>
                </div>
                <div class="button-37" data-value="/">
                    <p class="text-38"><span class="text-black">/</span></p>
                </div>
                <div class="button-39" data-value="*">
                    <p class="text-40"><span class="text-black">X</span></p>
                </div>
            </div>

            <div class="frame-1-41" >
                <div class="button-42">
                    <p class="text-43"><span class="text-white">RESET</span></p>
                </div>
                <div class="button-44">
                    <button type="submit" class="equal-button-native">
                        <p class="text-45"><span class="text-black">=</span></p>
                    </button>
                </div>
            </div>


        </div>
    </div>
</form>

<script src="/js/script.js"></script>
</body>

</html>

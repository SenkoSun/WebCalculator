<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hello World - Thymeleaf</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            font-size: 3em;
        }

        .message {
            font-size: 1.5em;
            color: #333;
            margin: 20px 0;
        }

        .time {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- th:text заменяет содержимое тега на значение переменной -->
    <h1 th:text="${title}">Заголовок по умолчанию</h1>

    <div class="message" th:text="${message}">
        Сообщение по умолчанию
    </div>

</div>
</body>
</html>
